  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white:   #ffffff;
      --gray-50: #fafafa;
      --gray-100:#f4f4f4;
      --gray-200:#e8e8e8;
      --gray-300:#d0d0d0;
      --gray-400:#a8a8a8;
      --gray-500:#787878;
      --gray-600:#505050;
      --gray-700:#383838;
      --gray-800:#202020;
      --black:   #0a0a0a;

      --bg:        var(--gray-100);
      --surface:   var(--white);
      --text:      var(--black);
      --text-muted:var(--gray-600);
      --border:    var(--gray-200);
      --radius-md: 12px;
      --radius-lg: 16px;
    }

    html { font-size: 17px; scroll-behavior: smooth; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    header {
      background: var(--black);
      padding: 0 1.5rem;
      position: sticky; top: 0; z-index: 50;
      display: flex; align-items: center; justify-content: space-between;
      height: 68px;
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .logo { width: 42px; height: 42px; background: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
    .header-title { font-size: 1.2rem; font-weight: 700; color: #fff; letter-spacing: -0.02em; }
    .header-sub { font-size: 0.8rem; color: rgba(255,255,255,0.5); }

    .page { max-width: 1100px; margin: 0 auto; padding: 2rem 1rem 4rem; }

    .controls {
      display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
      margin-bottom: 1.5rem; padding: 1.2rem 1.4rem;
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
    }

    /* Search */
    .search-wrap { position: relative; flex: 1; min-width: 260px; }
    .search-wrap i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 20px; }
    #search {
      width: 100%; padding: 12px 14px 12px 48px;
      border: 2px solid var(--border); border-radius: var(--radius-md); font-size: 1.05rem;
    }
    #search:focus { border-color: var(--black); }

    /* Filter Buttons */
    .filter-btn {
      padding: 9px 16px; 
      border-radius: var(--radius-md); 
      border: 2px solid var(--border);
      background: var(--surface); 
      cursor: pointer; 
      font-weight: 500;
      transition: all 0.2s;
    }
    .filter-btn.active {
      background: var(--black); 
      color: white; 
      border-color: var(--black);
    }

    /* Improved Sort Select */
    .sort-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sort-wrap label {
      font-size: 0.9rem;
      color: var(--text-muted);
      font-weight: 500;
      white-space: nowrap;
    }
    #sort {
      appearance: none;
      padding: 9px 36px 9px 16px;
      border: 2px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--surface) url('data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 width=%2716%27 height=%2716%27 fill=%27none%27 stroke=%27%23505050%27 stroke-width=%272%27 stroke-linecap=%27round%27 stroke-linejoin=%27round%27%3E%3Cpolyline points=%276 9 12 15 18 9%27/%3E%3C/svg%27') no-repeat right 12px center;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      color: var(--text);
      min-width: 160px;
    }
    #sort:focus {
      border-color: var(--black);
      outline: none;
      box-shadow: 0 0 0 3px rgba(0,0,0,0.08);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      cursor: pointer;
      transition: all 0.25s ease;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 20px -8px rgba(0,0,0,0.15);
      border-color: var(--black);
    }

    .card-top {
      display: flex; 
      align-items: center; 
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .card-logo {
      width: 48px; height: 48px;
      border-radius: 10px; object-fit: contain;
      background: #f8f8f8; padding: 4px;
    }
    .symbol-badge {
      font-size: 0.95rem; font-weight: 700;
      background: var(--black); color: white;
      padding: 4px 12px; border-radius: 9999px;
    }
    .cat-badge {
      font-size: 0.78rem; padding: 3px 10px;
      border-radius: var(--radius-sm); font-weight: 500;
    }
    .cat-us { background: #f0f0f0; color: #333; }
    .cat-ca { background: #e6f0ff; color: #0066cc; }

    .card-name { font-size: 1.1rem; font-weight: 600; line-height: 1.3; margin-bottom: 4px; }
    .card-ticker { color: var(--text-muted); font-family: monospace; }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); z-index: 200;
      align-items: center; justify-content: center; padding: 1rem;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: white; border-radius: var(--radius-lg);
      max-width: 520px; width: 100%; max-height: 92vh; overflow-y: auto;
    }
    .modal-header {
      padding: 1.5rem 1.5rem 1rem; display: flex; gap: 16px;
    }
    .modal-logo { width: 72px; height: 72px; border-radius: 14px; object-fit: contain; background: #f8f8f8; padding: 8px; }
    .modal-close { font-size: 28px; cursor: pointer; background: none; border: none; color: var(--text-muted); }

    .modal-body { padding: 1.5rem; }
    .modal-description { line-height: 1.7; font-size: 1.02rem; margin: 1.25rem 0; }
  </style>
</head>

<header>
  <div class="header-left">
    <div class="logo">📈</div>
    <div>
      <div class="header-title">My Stock Watch</div>
      <div class="header-sub">48 Stocks • Canadian View</div>
    </div>
  </div>
  <div id="hdate" style="color:rgba(255,255,255,0.6); font-size:0.9rem;"></div>
</header>

<main class="page">
  <div class="controls">
    <div class="search-wrap">
      <i class="ti ti-search"></i>
      <input type="text" id="search" placeholder="Search symbol or company name..." oninput="render()">
    </div>

    <div class="filter-btns">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('us',this)">US CDR</button>
      <button class="filter-btn" onclick="setFilter('ca',this)">Canadian</button>
    </div>

    <!-- Improved Sort -->
    <div class="sort-wrap">
      <label for="sort">Sort by:</label>
      <select id="sort" onchange="render()">
        <option value="name">Name A–Z</option>
        <option value="symbol">Symbol A–Z</option>
      </select>
    </div>
  </div>

  <p id="count" style="margin: 0 0 1rem 0; color: var(--text-muted); font-weight:500;"></p>
  <div class="grid" id="grid"></div>
</main>

<footer>For informational purposes only • Not financial advice • © 2026</footer>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">

      </div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="m-body"></div>
  </div>
</div>

document.getElementById('hdate').textContent = new Date().toLocaleDateString('en-CA', {weekday:'long', year:'numeric', month:'long', day:'numeric'});

let activeFilter = 'all';

function isCA(s) { return s.canadian_ticker.endsWith('.TO'); }

function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const sortBy = document.getElementById('sort').value;

  let list = stocks.filter(s => {
    const matchFilter = activeFilter === 'all' ||
      (activeFilter === 'us' && !isCA(s)) ||
      (activeFilter === 'ca' && isCA(s));
    const matchQ = !q || s.symbol.toLowerCase().includes(q) || s.name.toLowerCase().includes(q);
    return matchFilter && matchQ;
  });

  list.sort((a,b) => sortBy === 'symbol' ? a.symbol.localeCompare(b.symbol) : a.name.localeCompare(b.name));

  document.getElementById('count').textContent = `${list.length} stock${list.length !== 1 ? 's' : ''} shown`;

  const grid = document.getElementById('grid');
  grid.innerHTML = list.map(s => {
    const cat = isCA(s) 
      ? `<span class="cat-badge cat-ca">Canadian</span>` 
      : `<span class="cat-badge cat-us">US CDR</span>`;
    
    return `
      <div class="card" onclick="openModal('${s.symbol}')">
        <div class="card-top">
          <div style="display:flex; align-items:center; gap:12px;">
            <img class="card-logo" src="${s.logo_url}" alt="${s.symbol}">
            <span class="symbol-badge">${s.symbol}</span>
          </div>
          ${cat}
        </div>
        <div class="card-name">${s.name}</div>
        <div class="card-ticker">${s.canadian_ticker}</div>
      </div>`;
  }).join('');
}

function openModal(sym) {
  const s = stocks.find(x => x.symbol === sym);
  if (!s) return;

  document.getElementById('m-name').textContent = s.name;
  document.getElementById('m-ticker').textContent = s.canadian_ticker;
  document.getElementById('m-logo').src = s.logo_url;

  document.getElementById('m-body').innerHTML = `
    <p class="modal-description">${s.description}</p>
    <a href="${s.yahoo_finance_url}" target="_blank" style="display:block; margin-top:20px; padding:14px; background:#000; color:white; text-align:center; border-radius:10px; text-decoration:none; font-weight:600;">
      Open on Yahoo Finance →
    </a>
  `;

  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

render();
</script>
